name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Código ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 3. Build web app ────────────────────────────────────────────────────
      - name: Verificar secrets do Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets VITE_SUPABASE_URL e/ou VITE_SUPABASE_ANON_KEY não encontrados. Configure em Settings → Secrets and variables → Actions (os nomes devem ser EXATAMENTE estes). Sem eles o APK ficaria sem conexão com o banco — build abortado."
            exit 1
          fi
          echo "Supabase OK: URL com ${#VITE_SUPABASE_URL} caracteres, chave com ${#VITE_SUPABASE_ANON_KEY} caracteres."

      - name: Build web app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_VERSION: ${{ github.run_number }}
        run: npm run build

      # ── 4. Capacitor sync ───────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 5. Java & Android SDK ────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ── 6. Build APK ────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug -PappVersionCode=${{ github.run_number }} -PappVersionName="1.${{ github.run_number }}" --stacktrace

      # ── 7. Renomear APK ─────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ALS-Operacional.apk

      # ── 8. Publicar release "latest" ─────────────────────────────────────────
      - name: Create / Update "latest" release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "ALS Operacional — Versão Atual"
          body: |
            ## ALS Operacional APK

            Build automático gerado em ${{ github.event.head_commit.timestamp || 'dispatch' }}.

            **Commit:** ${{ github.sha }}

            ### Como instalar
            1. Baixe o arquivo `ALS-Operacional.apk` abaixo
            2. No Android: Configurações → Segurança → "Fontes desconhecidas" → Ativar
            3. Abra o APK e instale

            > Este arquivo é atualizado automaticamente a cada push na branch `main`.
          artifacts: "ALS-Operacional.apk"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Atualizar versão no Supabase ──────────────────────────────────────
      - name: Update app version in Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Secrets do Supabase não configurados — pulando atualização de versão."
            exit 0
          fi
          curl -s -X POST \
            "$SUPABASE_URL/rest/v1/app_config" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\": \"mobile_app_version\", \"value\": \"${{ github.run_number }}\"}" || true
